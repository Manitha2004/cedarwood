name: Build Mac DMG

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build with Maven
        run: mvn clean package

      - name: Verify JAR exists
        run: ls -la target

      - name: Create DMG with jpackage
        run: |
          jpackage \
            --type dmg \
            --name CedarWoodApp \
            --input target \
            --main-jar CedarWoodApp-1.0-SNAPSHOT.jar \
            --main-class cedarwood.Launcher \
            --icon .github/icons/CedarWoodApp.icns \
            --dest output \
            --app-version 1.0 \
            --vendor "Manitha"

      - name: Show output files
        run: ls -la output

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: CedarWoodApp-mac-dmg
          path: output/*.dmg
          if-no-files-found: error
